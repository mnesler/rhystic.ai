name: CI & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: maxtory
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Get short commit SHA
        id: sha
        run: echo "SHORT_SHA=${{ github.sha[:7] }}" >> $GITHUB_OUTPUT

      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/maxtory/mtg-backend:preprod-${{ steps.sha.outputs.SHORT_SHA }}

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/maxtory/mtg-frontend:preprod-${{ steps.sha.outputs.SHORT_SHA }}
          build-args: |
            VITE_API_URL=https://mtg-backend-preprod-442808877651.us-central1.run.app

      - name: Deploy backend
        run: |
          gcloud run deploy mtg-backend-preprod \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/maxtory/mtg-backend:preprod-${{ steps.sha.outputs.SHORT_SHA }} \
            --platform managed --region ${{ env.REGION }} --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated --port 3002

      - name: Deploy frontend
        run: |
          gcloud run deploy mtg-frontend-preprod \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/maxtory/mtg-frontend:preprod-${{ steps.sha.outputs.SHORT_SHA }} \
            --platform managed --region ${{ env.REGION }} --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated --port 8080 \
            --set-env-vars API_BACKEND_URL=https://mtg-backend-preprod-442808877651.us-central1.run.app
