name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., preprod-abc1234 or latest)'
        required: true
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT: maxtory
      REGION: us-central1

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy mtg-backend-prod \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/maxtory/mtg-backend:${{ github.event.inputs.image_tag }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port 3002

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy mtg-frontend-prod \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/maxtory/mtg-frontend:${{ github.event.inputs.image_tag }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars API_BACKEND_URL=https://mtg-backend-prod-442808877651.us-central1.run.app
