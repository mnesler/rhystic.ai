name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., preprod-abc1234 or latest)'
        required: true
        default: 'latest'

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  REGION: us-central1
  AR_REPO: maxtory
  BACKEND_SERVICE: mtg-backend-prod
  FRONTEND_SERVICE: mtg-frontend-prod

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $REGION-docker.pkg.dev/$GCP_PROJECT/$AR_REPO/mtg-backend:${{ github.event.inputs.image_tag }} \
            --platform managed \
            --region $REGION \
            --project $GCP_PROJECT \
            --allow-unauthenticated \
            --port 3002

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $REGION-docker.pkg.dev/$GCP_PROJECT/$AR_REPO/mtg-frontend:${{ github.event.inputs.image_tag }} \
            --platform managed \
            --region $REGION \
            --project $GCP_PROJECT \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars API_BACKEND_URL=https://mtg-backend-prod-442808877651.us-central1.run.app
