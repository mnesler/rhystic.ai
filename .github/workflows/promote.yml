name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3)'
        required: true
      confirm:
        description: 'Type "promote" to confirm'
        required: true

env:
  REGISTRY: us-central1-docker.pkg.dev/maxtory/maxtory

jobs:
  promote:
    name: Promote preprod → prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "promote" ]; then
            echo "Confirmation input must be exactly 'promote'."
            exit 1
          fi
          if ! echo "${{ github.event.inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must match vX.Y.Z format. Got: ${{ github.event.inputs.version }}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        run: gcloud auth activate-service-account --key-file=<(echo '${{ secrets.GCP_SA_KEY }}')

      - name: Get backend image from preprod
        id: backend
        run: |
          IMAGE=$(gcloud run services describe mtg-backend-preprod \
            --region=us-central1 \
            --project=maxtory \
            --format="value(spec.template.spec.containers[0].image)")
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Backend image: $IMAGE"

      - name: Get frontend image from preprod
        id: frontend
        run: |
          IMAGE=$(gcloud run services describe mtg-frontend-preprod \
            --region=us-central1 \
            --project=maxtory \
            --format="value(spec.template.spec.containers[0].image)")
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Frontend image: $IMAGE"

      - name: Deploy backend to prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: mtg-backend
          image: ${{ steps.backend.outputs.image }}
          region: us-central1
          flags: --memory=2Gi

      - name: Deploy frontend to prod
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: mtg-frontend
          image: ${{ steps.frontend.outputs.image }}
          region: us-central1
          env_vars: |
            API_BACKEND_URL=https://mtg-backend-n2jwqhiduq-uc.a.run.app

      - name: Tag release in git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.version }}" \
            -m "Release ${{ github.event.inputs.version }}
          
          Backend:  ${{ steps.backend.outputs.image }}
          Frontend: ${{ steps.frontend.outputs.image }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Summary
        run: |
          echo "### Promoted to production — ${{ github.event.inputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| mtg-backend | \`${{ steps.backend.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mtg-frontend | \`${{ steps.frontend.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
