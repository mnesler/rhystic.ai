name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm deploying preprod to production'
        required: true

env:
  REGISTRY: us-central1-docker.pkg.dev/maxtory/maxtory
  IMAGE: mtg-backend

jobs:
  promote:
    name: Promote preprod → prod
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'promote' }}
        run: |
          echo "Confirmation input must be exactly 'promote'. Got: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        run: gcloud auth activate-service-account --key-file=<(echo '${{ secrets.GCP_SA_KEY }}')

      - name: Get image currently running in preprod
        id: preprod
        run: |
          IMAGE=$(gcloud run services describe mtg-backend-preprod \
            --region=us-central1 \
            --project=maxtory \
            --format="value(spec.template.spec.containers[0].image)")
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Promoting image: $IMAGE"

      - name: Deploy to prod (mtg-backend)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: mtg-backend
          image: ${{ steps.preprod.outputs.image }}
          region: us-central1
          flags: --memory=2Gi

      - name: Summary
        run: |
          echo "### Promoted to production" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ steps.preprod.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Service:** mtg-backend (us-central1)" >> "$GITHUB_STEP_SUMMARY"
