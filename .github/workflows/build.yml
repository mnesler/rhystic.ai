name: Build

on:
  push:
    branches: [main]

env:
  REGISTRY: us-central1-docker.pkg.dev/maxtory/maxtory
  IMAGE: mtg-backend
  SERVICE: mtg-backend-preprod

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up gcloud
        run: |
          gcloud auth activate-service-account --key-file=<(echo '${{ secrets.GCP_SA_KEY }}')
          gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          region: us-central1
