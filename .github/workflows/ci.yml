name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-backend:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/maxtory/mtg-backend:pr-${{ github.event.pull_request.number }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/maxtory/mtg-frontend:pr-${{ github.event.pull_request.number }}
          build-args: |
            VITE_API_URL=https://mtg-backend-preprod-442808877651.us-central1.run.app
