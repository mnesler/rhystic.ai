name: DB Migrate to Cloud SQL

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/src/db/**'
      - 'backend/src/assistant/server.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm test
      - run: npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/maxtory/mtg-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/deploy-cloud-run@v2
        with:
          service: mtg-backend-preprod
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/maxtory/mtg-backend:${{ github.sha }}
          region: us-central1
          flags: --allow-unauthenticated
